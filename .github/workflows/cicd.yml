name: static and dynamic code build
on: [push]
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: check out code from github to runner
        uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '18.x'
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0 # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: install dependecies and build
        run: |
          npm install
          npm run build
