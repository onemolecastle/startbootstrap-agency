name: docker build

on: [push]

jobs:
  docker:
    runs-on: self-hosted
    steps:
      - name: verify identity
        run: whoami
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          #push: true
          tags: user/app:latest
          file: ./Dockerfile
